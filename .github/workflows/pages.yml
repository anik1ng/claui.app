name: pages

# Deploy the static site to GitHub Pages on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the workflow to publish to Pages; one deploy at a time, newest wins.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Only the landing lives under site/; application source sits at the
          # repo root. Publish just the static site, not the whole tree.
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
